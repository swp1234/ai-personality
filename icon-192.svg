<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#1a2040"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#00A8E8"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Robot head -->
  <rect x="56" y="50" width="80" height="72" rx="16" fill="none" stroke="url(#glow)" stroke-width="4"/>
  <!-- Eyes -->
  <circle cx="80" cy="82" r="10" fill="#00D4AA" opacity="0.9"/>
  <circle cx="112" cy="82" r="10" fill="#00D4AA" opacity="0.9"/>
  <circle cx="80" cy="82" r="4" fill="#fff"/>
  <circle cx="112" cy="82" r="4" fill="#fff"/>
  <!-- Mouth -->
  <rect x="74" y="102" width="44" height="6" rx="3" fill="#00D4AA" opacity="0.6"/>
  <!-- Antenna -->
  <line x1="96" y1="50" x2="96" y2="34" stroke="#00D4AA" stroke-width="3" stroke-linecap="round"/>
  <circle cx="96" cy="30" r="6" fill="#00D4AA"/>
  <!-- Circuit lines -->
  <line x1="56" y1="72" x2="36" y2="72" stroke="#00D4AA" stroke-width="2" opacity="0.4"/>
  <line x1="136" y1="72" x2="156" y2="72" stroke="#00D4AA" stroke-width="2" opacity="0.4"/>
  <line x1="56" y1="92" x2="36" y2="92" stroke="#00D4AA" stroke-width="2" opacity="0.4"/>
  <line x1="136" y1="92" x2="156" y2="92" stroke="#00D4AA" stroke-width="2" opacity="0.4"/>
  <!-- AI text -->
  <text x="96" y="155" text-anchor="middle" font-family="monospace" font-size="24" font-weight="bold" fill="#00D4AA">AI</text>
</svg>
