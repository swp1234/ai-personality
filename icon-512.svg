<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#1a2040"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#00A8E8"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Robot head -->
  <rect x="136" y="120" width="240" height="200" rx="40" fill="none" stroke="url(#glow)" stroke-width="8" filter="url(#neon)"/>
  <!-- Eyes -->
  <circle cx="206" cy="210" r="28" fill="#00D4AA" opacity="0.9"/>
  <circle cx="306" cy="210" r="28" fill="#00D4AA" opacity="0.9"/>
  <circle cx="206" cy="210" r="12" fill="#fff"/>
  <circle cx="306" cy="210" r="12" fill="#fff"/>
  <!-- Mouth -->
  <rect x="190" y="270" width="132" height="16" rx="8" fill="#00D4AA" opacity="0.6"/>
  <!-- Antenna -->
  <line x1="256" y1="120" x2="256" y2="76" stroke="#00D4AA" stroke-width="6" stroke-linecap="round"/>
  <circle cx="256" cy="66" r="14" fill="#00D4AA" filter="url(#neon)"/>
  <!-- Circuit lines -->
  <line x1="136" y1="180" x2="80" y2="180" stroke="#00D4AA" stroke-width="4" opacity="0.4"/>
  <line x1="376" y1="180" x2="432" y2="180" stroke="#00D4AA" stroke-width="4" opacity="0.4"/>
  <line x1="136" y1="240" x2="80" y2="240" stroke="#00D4AA" stroke-width="4" opacity="0.4"/>
  <line x1="376" y1="240" x2="432" y2="240" stroke="#00D4AA" stroke-width="4" opacity="0.4"/>
  <!-- AI text -->
  <text x="256" y="410" text-anchor="middle" font-family="monospace" font-size="64" font-weight="bold" fill="#00D4AA" filter="url(#neon)">AI</text>
</svg>
